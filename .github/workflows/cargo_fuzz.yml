name: "\U0001F41B Cargo Fuzz"
on:
  push:
  pull_request:
  schedule:
    - cron: '0 21 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-fuzz:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: IMAGE
            fuzz_target: image
            timeout: 200
            files: "AA_IMAGE_VALID_FILES.7z"
          - name: HAYRO
            fuzz_target: hayro
            timeout: 200
            files: "AA_PDF_VALID_FILES2.7z"
          - name: ZUNE
            fuzz_target: zune
            timeout: 200
            files: "AA_IMAGE_VALID_FILES.7z"
          - name: SYMPHONIA
            fuzz_target: symphonia
            timeout: 200
            files: "AA_MUSIC_VALID_FILES.7z"

    steps:
      - uses: actions/checkout@v4

      - name: Setup rust
        run: |
          rustup default nightly
          rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
          rustup component add llvm-tools-preview --toolchain nightly-x86_64-unknown-linux-gnu

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget earlyoom libasan8 llvm p7zip-full python3

      - name: Install tools
        run: cargo install cargo-fuzz minimizer

      - name: Update crate
        run: |
          cd crates/${{ matrix.fuzz_target }}
          cargo update
          cargo install --path .
          cd ../..

      # ── Download previous corpus and crashes from Nightly ──
      - name: Download previous data
        run: |
          mkdir -p /opt/INPUT_FILES_DIR /opt/PREV

          # Previous corpus
          gh release download Nightly \
            --pattern "corpus_CARGO_FUZZ_${{ matrix.name }}.7z" \
            --dir /opt/PREV --clobber 2>/dev/null || echo "No previous corpus"
          if [ -f "/opt/PREV/corpus_CARGO_FUZZ_${{ matrix.name }}.7z" ]; then
            cd /opt/INPUT_FILES_DIR
            7z x "/opt/PREV/corpus_CARGO_FUZZ_${{ matrix.name }}.7z" || true
            echo "Loaded corpus: $(find . -type f | wc -l) files"
            cd -
          fi

          # Previous crashes
          gh release download Nightly \
            --pattern "crashes_CARGO_FUZZ_${{ matrix.name }}.7z" \
            --dir /opt/PREV --clobber 2>/dev/null || echo "No previous crashes"
        env:
          GH_TOKEN: ${{ secrets.PAT2 }}

      - name: Download test files
        run: |
          CURR_DIR=$(pwd)
          cd /opt/INPUT_FILES_DIR
          if [ -z "$(ls -A .)" ]; then
            python3 "$CURR_DIR/download_helper.py" "${{ matrix.files }}"
          fi
          cd "$CURR_DIR"

      # ── Build and run fuzzer ──
      - name: Build cargo-fuzz
        run: |
          cd fuzz && cargo update && cd ..
          export RUST_BACKTRACE=1
          export ASAN_SYMBOLIZER_PATH=$(which llvm-symbolizer-18)
          export ASAN_OPTIONS=symbolize=1
          export RUSTFLAGS="-Zsanitizer=address"
          cargo fuzz build ${{ matrix.fuzz_target }} --release --features "${{ matrix.fuzz_target }}_f"

      - name: Run fuzzer
        run: |
          export RUST_BACKTRACE=1
          export ASAN_SYMBOLIZER_PATH=$(which llvm-symbolizer-18)
          export ASAN_OPTIONS="symbolize=1:allocator_may_return_null=1"
          export RUSTFLAGS="-Zsanitizer=address"
          cargo fuzz run ${{ matrix.fuzz_target }} /opt/INPUT_FILES_DIR/ \
            -j4 --release --features "${{ matrix.fuzz_target }}_f" \
            -- -max_len=99999 -max_total_time=${{ matrix.timeout }} -rss_limit_mb=20000 || true

      # ── Process results ──
      - name: Remove slow files
        run: find fuzz/artifacts/ -type f -name 'slow*' -exec rm {} +

      # ── Verify previous crashes (regression) ──
      - name: Verify previous crashes
        run: |
          if [ -f "/opt/PREV/crashes_CARGO_FUZZ_${{ matrix.name }}.7z" ]; then
            mkdir -p /opt/PREV_CRASHES
            cd /opt/PREV_CRASHES
            7z x "/opt/PREV/crashes_CARGO_FUZZ_${{ matrix.name }}.7z" || true
            cd "${{ github.workspace }}"

            echo "=== Verifying previous crash files ==="
            STILL_BROKEN=0
            FIXED=0
            for file in /opt/PREV_CRASHES/*; do
              [ -f "$file" ] || continue
              if timeout -v 100 ${{ matrix.fuzz_target }} "$file" 2>&1 | grep -qE "RUST_BACKTRACE|panicked at|AddressSanitizer|timeout: sending signal"; then
                # Still broken - add to current artifacts
                cp "$file" "fuzz/artifacts/${{ matrix.fuzz_target }}/" 2>/dev/null || true
                STILL_BROKEN=$((STILL_BROKEN + 1))
              else
                FIXED=$((FIXED + 1))
              fi
            done
            echo "Regression: $STILL_BROKEN still broken, $FIXED fixed"
          fi

      # ── Minimize ──
      - name: Minimize crashes
        run: |
          ARTIFACT_DIR="fuzz/artifacts/${{ matrix.fuzz_target }}"
          if [ -d "$ARTIFACT_DIR" ] && [ "$(ls -A "$ARTIFACT_DIR" 2>/dev/null)" ]; then
            export RUST_BACKTRACE=1
            export ASAN_SYMBOLIZER_PATH=$(which llvm-symbolizer-18)
            export ASAN_OPTIONS="symbolize=1:allocator_may_return_null=1"

            for file in "$ARTIFACT_DIR"/*; do
              [ -f "$file" ] || continue
              minimizer --input-file "$file" \
                --output-file "${file}_minimized" \
                --command "timeout -v 100 ${{ matrix.fuzz_target }} {}" \
                --attempts 10000 -r \
                -b "RUST_BACKTRACE" -b "panicked at" -b "AddressSanitizer" \
                -b "LeakSanitizer" -b "ThreadSanitizer" \
                -b "timeout: sending signal" -b "memory allocation of" \
                -v -t 1200 -s general_multi || true
            done
          fi

      # ── Dedup ──
      - name: Dedup crash files
        run: |
          python3 dedup_files.py "fuzz/artifacts/${{ matrix.fuzz_target }}" 2>/dev/null || true

      # ── Pack and upload ──
      - name: Count crashes
        run: |
          ARTIFACT_DIR="fuzz/artifacts/${{ matrix.fuzz_target }}"
          CRASH_COUNT=$(find "$ARTIFACT_DIR" -type f 2>/dev/null | wc -l)
          echo "CRASH_COUNT=$CRASH_COUNT" >> $GITHUB_ENV
          echo "Crash files: $CRASH_COUNT"

      - name: Pack crashes
        if: ${{ env.CRASH_COUNT != '0' }}
        run: |
          cd "fuzz/artifacts/${{ matrix.fuzz_target }}"
          7z a "${{ github.workspace }}/crashes_CARGO_FUZZ_${{ matrix.name }}.7z" .
          cd "${{ github.workspace }}"

      - name: Pack corpus
        run: |
          cd /opt/INPUT_FILES_DIR
          7z a "${{ github.workspace }}/corpus_CARGO_FUZZ_${{ matrix.name }}.7z" . -mx0
          cd "${{ github.workspace }}"

      - name: Upload to Nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Nightly"
          files: |
            crashes_CARGO_FUZZ_${{ matrix.name }}.7z
            corpus_CARGO_FUZZ_${{ matrix.name }}.7z
          token: ${{ secrets.PAT2 }}

      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: CARGO_FUZZ___${{ matrix.name }}
          path: fuzz/artifacts

      - name: Fail if crashes found
        run: |
          [ "$CRASH_COUNT" != "0" ] && exit 1 || true
