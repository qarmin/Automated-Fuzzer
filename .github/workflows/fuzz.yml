name: "Fuzz"
on:
  push:
  pull_request:
  schedule:
    - cron: '0 21 * * *'

env:
  CARGO_TERM_COLOR: always
  DEFAULT_TIMEOUT: 10000

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          #  Custom fuzzing (local crates)
          # Set custom_timeout to override DEFAULT_TIMEOUT for specific jobs
          - name: LITTLE_EXIF
            mode: custom
            crate: little_exif
            binary: little_exif
            files: "AA_NOM_EXIF_VALID_FILES.7z"
          - name: LOPDF
            mode: custom
            crate: lopdf
            binary: lopdf
            files: "AA_PDF_VALID_FILES2.7z"
          - name: HAYRO
            mode: custom
            crate: hayro
            binary: hayro
            files: "AA_PDF_VALID_FILES2.7z"
          - name: MOXCMS
            mode: custom
            crate: moxcms
            binary: moxcms
            files: "AA_ICC_VALID_FILES.7z"
          - name: ZUNE
            mode: custom
            crate: zune
            binary: zune
            files: "AA_IMAGE_VALID_FILES.7z"
          - name: SYMPHONIA
            mode: custom
            crate: symphonia
            binary: symphonia
            files: "AA_MUSIC_VALID_FILES.7z"

          #  Structured fuzzing (random byte input, no file corpus) 
          - name: PDF_WRITER
            mode: custom
            crate: pdf_writer
            binary: pdf_writer
            generate_corpus: true
            corpus_ext: bin
            corpus_count: 500
            corpus_max_size: 2048

          #  Cargo-fuzz (local crates) 
          - name: IMAGE
            mode: cargo-fuzz
            crate: image
            binary: image
            fuzz_target: image
            fuzz_features: image_f
            files: "AA_IMAGE_VALID_FILES.7z"
          - name: HAYRO_CF
            mode: cargo-fuzz
            crate: hayro
            binary: hayro
            fuzz_target: hayro
            fuzz_features: hayro_f
            files: "AA_PDF_VALID_FILES2.7z"
          - name: ZUNE_CF
            mode: cargo-fuzz
            crate: zune
            binary: zune
            fuzz_target: zune
            fuzz_features: zune_f
            files: "AA_IMAGE_VALID_FILES.7z"
          - name: SYMPHONIA_CF
            mode: cargo-fuzz
            crate: symphonia
            binary: symphonia
            fuzz_target: symphonia
            fuzz_features: symphonia_f
            files: "AA_MUSIC_VALID_FILES.7z"

          #  Custom fuzzing (external projects) 
          - name: TYRUF
            mode: custom
            external: true
            clone_url: "https://github.com/astral-sh/ruff/archive/refs/heads/main.zip"
            install_path: "ruff-main/crates/ty"
            cargo_toml_dir: "ruff-main"
            binary: ty
            run_args: "check"
            files: "FILES_21.zip"
            post_clone: |
              sd -F "std::mem::forget(db);" "//std::mem::forget(db);" ruff-main/crates/ty/src/lib.rs
          - name: PYREFLY
            mode: custom
            external: true
            clone_url: "https://github.com/facebook/pyrefly/archive/refs/heads/main.zip"
            install_path: "pyrefly-main/pyrefly"
            cargo_toml_dir: "pyrefly-main"
            binary: pyrefly
            run_args: "check"
            files: "FILES_21.zip"
          - name: SWC
            mode: custom
            external: true
            clone_url: "https://github.com/swc-project/swc/archive/refs/heads/main.zip"
            install_path: "swc-main/crates/swc_cli_impl"
            cargo_toml_dir: "swc-main"
            binary: swc
            run_args: "compile"
            files: "AA_JAVASCRIPT_VALID_FILES.7z"
          - name: BIOME
            mode: custom
            external: true
            clone_url: "https://github.com/biomejs/biome/archive/refs/heads/main.zip"
            install_path: "biome-main/crates/biome_cli"
            cargo_toml_dir: "biome-main"
            binary: biome
            run_args: "lint"
            files: "AA_JAVASCRIPT_VALID_FILES.7z"
          - name: BIOME_FORMAT
            mode: custom
            external: true
            clone_url: "https://github.com/biomejs/biome/archive/refs/heads/main.zip"
            install_path: "biome-main/crates/biome_cli"
            cargo_toml_dir: "biome-main"
            binary: biome
            run_args: "format"
            files: "AA_JAVASCRIPT_VALID_FILES.7z"
          - name: OXLINT
            mode: custom
            external: true
            clone_url: "https://github.com/oxc-project/oxc/archive/refs/heads/main.zip"
            install_path: "oxc-main/apps/oxlint"
            cargo_toml_dir: "oxc-main"
            binary: oxlint
            files: "AA_JAVASCRIPT_VALID_FILES.7z"
          - name: OXFMT
            mode: custom
            external: true
            clone_url: "https://github.com/oxc-project/oxc/archive/refs/heads/main.zip"
            install_path: "oxc-main/apps/oxfmt"
            install_args: "--no-default-features"
            cargo_toml_dir: "oxc-main"
            binary: oxfmt
            run_args: "--check"
            files: "AA_JAVASCRIPT_VALID_FILES.7z"

    steps:
      - uses: actions/checkout@v5

      - name: Setup rust
        run: |
          rustup default nightly
          rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu
          rustup component add llvm-tools-preview --toolchain nightly-x86_64-unknown-linux-gnu

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget earlyoom libasan8 llvm sd python3 p7zip-full

      - name: Install fuzzer tools
        run: |
          cargo install create_broken_files minimizer
          cargo install --path .
          if [ "${{ matrix.mode }}" = "cargo-fuzz" ]; then
            cargo install cargo-fuzz
          fi

      # ══════════════════════════════════════════════════════════
      # PHASE 1: Build
      # ══════════════════════════════════════════════════════════
      - name: Build local crate
        if: ${{ matrix.external != true }}
        run: |
          cd crates/${{ matrix.crate }}
          cargo update
          # Normal build
          cargo +nightly install --path . --locked --target x86_64-unknown-linux-gnu 2>/dev/null || \
            cargo +nightly install --path . --target x86_64-unknown-linux-gnu
          sudo cp "$(which ${{ matrix.binary }})" /usr/local/bin/${{ matrix.binary }}_normal
          # ASAN build
          RUSTFLAGS="-Zsanitizer=address" cargo +nightly install --path . --locked --target x86_64-unknown-linux-gnu 2>/dev/null || \
            RUSTFLAGS="-Zsanitizer=address" cargo +nightly install --path . --target x86_64-unknown-linux-gnu
          sudo cp "$(which ${{ matrix.binary }})" /usr/local/bin/${{ matrix.binary }}

      - name: Clone external project
        if: ${{ matrix.external == true }}
        run: |
          wget -q "${{ matrix.clone_url }}" && unzip -q *.zip && rm -f *.zip
          ${{ matrix.post_clone }}
          # Patch release profile
          TOML="${{ matrix.cargo_toml_dir }}/Cargo.toml"
          sed -i '/^\[profile\.release\]/,/^\[.*\]/ { /^\[profile\.release\]/d; /^\[.*\]/!d; }' "$TOML"
          cat >> "$TOML" << 'EOPROFILE'
          [profile.release]
          overflow-checks = true
          debug = true
          debug-assertions = true
          lto = "thin"
          codegen-units = 1
          EOPROFILE
          find . -name "rust-toolchain.toml" -exec rm -f {} \; || true
          find . -name ".cargo" -exec rm -rf {} \; || true

      - name: Build external project
        if: ${{ matrix.external == true }}
        run: |
          INSTALL_ARGS="${{ matrix.install_args }}"
          cargo +nightly install --path "${{ matrix.install_path }}" $INSTALL_ARGS --locked --target x86_64-unknown-linux-gnu 2>/dev/null || \
            cargo +nightly install --path "${{ matrix.install_path }}" $INSTALL_ARGS --target x86_64-unknown-linux-gnu
          sudo cp "$(which ${{ matrix.binary }})" /usr/local/bin/${{ matrix.binary }}_normal
          RUSTFLAGS="-Zsanitizer=address" cargo +nightly install --path "${{ matrix.install_path }}" $INSTALL_ARGS --locked --target x86_64-unknown-linux-gnu 2>/dev/null || \
            RUSTFLAGS="-Zsanitizer=address" cargo +nightly install --path "${{ matrix.install_path }}" $INSTALL_ARGS --target x86_64-unknown-linux-gnu
          sudo cp "$(which ${{ matrix.binary }})" /usr/local/bin/${{ matrix.binary }}

      - name: Build cargo-fuzz targets
        if: ${{ matrix.mode == 'cargo-fuzz' }}
        run: |
          cd fuzz && cargo update && cd ..
          export RUSTFLAGS="-Zsanitizer=address"
          cargo fuzz build ${{ matrix.fuzz_target }} --release --features "${{ matrix.fuzz_features }}"

      - name: Clean build artifacts + upload binaries
        run: |
          7z a "${{ matrix.binary }}_normal.7z" "/usr/local/bin/${{ matrix.binary }}_normal"
          7z a "${{ matrix.binary }}.7z" "/usr/local/bin/${{ matrix.binary }}"
          gh release upload Nightly "${{ matrix.binary }}_normal.7z" "${{ matrix.binary }}.7z" --clobber 2>/dev/null || true
          git clean -xqdf || true
        env:
          GH_TOKEN: ${{ secrets.PAT2 }}

      # ══════════════════════════════════════════════════════════
      # PHASE 2: Prepare data + Fuzz
      # ══════════════════════════════════════════════════════════
      - name: Create directories
        run: mkdir -p /opt/VALID_FILES_DIR /opt/BROKEN_FILES_DIR /opt/POSSIBLY_BROKEN_FILES_DIR /tmp/tmp_folder/data /opt/CUSTOM /opt/INPUT_FILES_DIR

      - name: Download or generate test files
        run: |
          CURR_DIR=$(pwd)
          TARGET_DIR="/opt/VALID_FILES_DIR"
          if [ "${{ matrix.mode }}" = "cargo-fuzz" ]; then
            TARGET_DIR="/opt/INPUT_FILES_DIR"
          fi

          if [ "${{ matrix.generate_corpus }}" = "true" ]; then
            # Generate random seed files for structured fuzzing
            EXT="${{ matrix.corpus_ext || 'bin' }}"
            COUNT="${{ matrix.corpus_count || '500' }}"
            MAX_SIZE="${{ matrix.corpus_max_size || '2048' }}"
            echo "Generating $COUNT random seed files (max ${MAX_SIZE} bytes, .$EXT)"
            python3 -c "
          import os, random
          d = '$TARGET_DIR'
          for i in range($COUNT):
              size = random.randint(8, $MAX_SIZE)
              data = random.randbytes(size)
              with open(os.path.join(d, f'seed_{i}.{\"$EXT\"}'), 'wb') as f:
                  f.write(data)
          "
            echo "Generated $(ls $TARGET_DIR | wc -l) files"
          else
            # Download corpus archive
            cd "$TARGET_DIR"
            python3 "$CURR_DIR/download_helper.py" "${{ matrix.files }}"
            cd "$CURR_DIR"
          fi

          # cargo-fuzz: also download previous corpus if exists
          if [ "${{ matrix.mode }}" = "cargo-fuzz" ]; then
            gh release download Nightly \
              --pattern "corpus_${{ matrix.name }}.7z" \
              --dir /tmp --clobber 2>/dev/null || true
            if [ -f "/tmp/corpus_${{ matrix.name }}.7z" ]; then
              cd /opt/INPUT_FILES_DIR
              7z x "/tmp/corpus_${{ matrix.name }}.7z" 2>/dev/null || true
              cd "$CURR_DIR"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT2 }}

      #  Custom fuzzing 
      - name: "Fuzz: custom mode"
        if: ${{ matrix.mode == 'custom' }}
        run: |
          if [ -f "crates/${{ matrix.crate }}/fuzz_settings_ci.toml" ]; then
            cp "crates/${{ matrix.crate }}/fuzz_settings_ci.toml" fuzz_settings.toml
          elif [ -f "configs/external/fuzz_$(echo '${{ matrix.name }}' | tr '[:upper:]' '[:lower:]')_settings_ci.toml" ]; then
            cp "configs/external/fuzz_$(echo '${{ matrix.name }}' | tr '[:upper:]' '[:lower:]')_settings_ci.toml" fuzz_settings.toml
          fi
          sd "TMP_FOLDER_TO_REPLACE" "/tmp/tmp_folder/data" fuzz_settings.toml
          export RUST_BACKTRACE=1
          auto_fuzzer fuzz --mode custom --timeout ${{ matrix.custom_timeout || env.DEFAULT_TIMEOUT }}

      #  Cargo-fuzz
      - name: "Fuzz: cargo-fuzz mode (loop until timeout)"
        if: ${{ matrix.mode == 'cargo-fuzz' }}
        run: |
          bash ci_cargo_fuzz_loop.sh \
            "${{ matrix.fuzz_target }}" \
            "${{ matrix.fuzz_features }}" \
            "/opt/INPUT_FILES_DIR" \
            "${{ matrix.custom_timeout || env.DEFAULT_TIMEOUT }}" \
            4

      - name: "Minimize: cargo-fuzz crashes"
        if: ${{ matrix.mode == 'cargo-fuzz' }}
        run: |
          ARTIFACT_DIR="fuzz/artifacts/${{ matrix.fuzz_target }}"
          if [ -d "$ARTIFACT_DIR" ] && [ "$(ls -A "$ARTIFACT_DIR" 2>/dev/null)" ]; then
            export RUST_BACKTRACE=1
            export ASAN_SYMBOLIZER_PATH=$(which llvm-symbolizer-18)
            export ASAN_OPTIONS="symbolize=1:allocator_may_return_null=1"

            # Hard wall-clock budget for the whole minimize phase so it can never
            # eat the 6h job limit. Per-file time is also capped (and shrunk to
            # whatever budget is left) so a single stubborn artifact can't run
            # away. `-t 1200` per file with N artifacts was the timeout cause.
            MINIMIZE_BUDGET="${MINIMIZE_BUDGET:-2700}"   # 45 min overall
            MINIMIZE_PER_FILE="${MINIMIZE_PER_FILE:-300}" # 5 min per file
            MIN_DEADLINE=$(( $(date +%s) + MINIMIZE_BUDGET ))

            for file in "$ARTIFACT_DIR"/*; do
              [ -f "$file" ] || continue

              REMAINING=$(( MIN_DEADLINE - $(date +%s) ))
              if [ "$REMAINING" -le 10 ]; then
                echo "=== Minimize budget (${MINIMIZE_BUDGET}s) exhausted — skipping remaining artifacts ==="
                break
              fi

              PER_FILE=$MINIMIZE_PER_FILE
              [ "$PER_FILE" -gt "$REMAINING" ] && PER_FILE=$REMAINING

              minimizer --input-file "$file" \
                --output-file "${file}_minimized" \
                --command "timeout -v 100 ${{ matrix.fuzz_target }} {}" \
                --attempts 10000 -r \
                -b "RUST_BACKTRACE" -b "panicked at" -b "AddressSanitizer" \
                -b "LeakSanitizer" -b "ThreadSanitizer" \
                -b "timeout: sending signal" -b "memory allocation of" \
                -v -t "$PER_FILE" -s general_multi || true
            done
          fi

      # ══════════════════════════════════════════════════════════
      # PHASE 3: Stage local crashes in /opt/BROKEN_FILES_DIR
      # ══════════════════════════════════════════════════════════
      # Custom mode already writes there during the fuzz step. Cargo-fuzz
      # artifacts (fuzz/artifacts/<target>/) need to be copied in. From this
      # point on, /opt/BROKEN_FILES_DIR is the single working set — the
      # sync/filter loop merges remote crashes here, then the built-in filter
      # (auto_fuzzer legacy --remove-non-crashing) prunes anything that does
      # not reproduce per the project's TOML config.
      - name: "Stage local crashes"
        run: |
          mkdir -p /opt/BROKEN_FILES_DIR

          if [ "${{ matrix.mode }}" = "cargo-fuzz" ]; then
            ARTIFACT_DIR="fuzz/artifacts/${{ matrix.fuzz_target }}"
            if [ -d "$ARTIFACT_DIR" ]; then
              BEFORE=$(find /opt/BROKEN_FILES_DIR -type f | wc -l)
              find "$ARTIFACT_DIR" -type f -exec cp {} /opt/BROKEN_FILES_DIR/ \;
              AFTER=$(find /opt/BROKEN_FILES_DIR -type f | wc -l)
              echo "Copied $((AFTER - BEFORE)) cargo-fuzz crashes from $ARTIFACT_DIR"
            fi
          fi

          python3 dedup_files.py /opt/BROKEN_FILES_DIR
          echo "Local crash files: $(find /opt/BROKEN_FILES_DIR -type f | wc -l)"

      # ══════════════════════════════════════════════════════════
      # PHASE 4: Sync with remote archive, filter via built-in mechanism,
      #          upload crashes + reports. All in one race-safe loop.
      # ══════════════════════════════════════════════════════════
      # Strip _CF suffix so cargo-fuzz and custom results share the same archive.
      - name: "Sync, filter, upload (loop)"
        run: |
          BASE_NAME=$(echo "${{ matrix.name }}" | sed 's/_CF$//')
          echo "BASE_NAME=$BASE_NAME" >> $GITHUB_ENV

          # Make sure fuzz_settings.toml is set up for the filter step.
          # Custom mode has it already (copied during the fuzz step). Cargo-fuzz
          # mode never copies one — point at the project's checked-in config if
          # it exists, else fall back to the repo default.
          if [ ! -f fuzz_settings.toml ]; then
            if [ -f "crates/${{ matrix.crate }}/fuzz_settings_ci.toml" ]; then
              cp "crates/${{ matrix.crate }}/fuzz_settings_ci.toml" fuzz_settings.toml
            elif [ -f "configs/external/fuzz_$(echo '${{ matrix.name }}' | tr '[:upper:]' '[:lower:]')_settings_ci.toml" ]; then
              cp "configs/external/fuzz_$(echo '${{ matrix.name }}' | tr '[:upper:]' '[:lower:]')_settings_ci.toml" fuzz_settings.toml
            fi
          fi
          sd "TMP_FOLDER_TO_REPLACE" "/tmp/tmp_folder/data" fuzz_settings.toml || true

          # The filter only runs when this flag is true.
          sd "remove_non_crashing_items_from_broken_files = false" \
             "remove_non_crashing_items_from_broken_files = true" fuzz_settings.toml || true

          # Be permissive about extensions: remote archives may contain
          # extension-less cargo-fuzz crash files (`crash-<hash>`, `*_minimized`)
          # alongside files with the project's normal extension.
          sd '(?m)^extensions = ".*"' 'extensions = ""' fuzz_settings.toml || true

          # Cargo-fuzz mode: the per-target config (if any) may not exist or may
          # name the wrong binary. Rewire to the binary that was actually built.
          if [ "${{ matrix.mode }}" = "cargo-fuzz" ]; then
            sd '(?m)^name = ".*"' 'name = "${{ matrix.binary }}"' fuzz_settings.toml || true
            sd '(?m)^command = ".*"' 'command = "${{ matrix.binary }}_normal|FILE_PATHS_TO_PROVIDE"' fuzz_settings.toml || true
          fi

          echo "DIAG: fuzz_settings.toml relevant lines:"
          grep -E "broken_files_dir|extensions|^name = |^command = |current_mode|temp_folder|max_file_size_limit" fuzz_settings.toml || true

          export RUST_BACKTRACE=1
          export ASAN_SYMBOLIZER_PATH=$(which llvm-symbolizer-18)
          export ASAN_OPTIONS="symbolize=1"

          RESULT=$(bash ci_merge_filter_upload.sh "$BASE_NAME" /opt/BROKEN_FILES_DIR /tmp/tmp_folder/data 10)
          echo "$RESULT"
          COUNT=$(echo "$RESULT" | grep "^CRASH_COUNT=" | tail -1 | cut -d= -f2)
          REPORTS=$(echo "$RESULT" | grep "^REPORT_COUNT=" | tail -1 | cut -d= -f2)
          echo "CRASH_COUNT=${COUNT:-0}" >> $GITHUB_ENV
          echo "REPORT_COUNT=${REPORTS:-0}" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.PAT2 }}

      # Upload corpus for cargo-fuzz
      - name: "Upload corpus"
        if: ${{ matrix.mode == 'cargo-fuzz' }}
        run: |
          cd /opt/INPUT_FILES_DIR
          7z a "${{ github.workspace }}/corpus_${{ matrix.name }}.7z" . -mx0
          cd "${{ github.workspace }}"
          gh release upload Nightly "corpus_${{ matrix.name }}.7z" --clobber
        env:
          GH_TOKEN: ${{ secrets.PAT2 }}

      # ══════════════════════════════════════════════════════════
      # PHASE 5: Print crash details (visible in CI logs without download)
      # ══════════════════════════════════════════════════════════
      - name: "Print crash details"
        if: always()
        run: |
          CRASH_COUNT=$(find /opt/BROKEN_FILES_DIR -type f 2>/dev/null | wc -l)
          if [ "$CRASH_COUNT" -eq 0 ]; then
            echo "No crashes survived filter."
            exit 0
          fi

          echo "═══════════════════════════════════════════════════"
          echo "  $CRASH_COUNT crash files for ${{ matrix.name }}"
          echo "═══════════════════════════════════════════════════"
          echo ""

          IDX=0
          for file in /opt/BROKEN_FILES_DIR/*; do
            [ -f "$file" ] || continue
            IDX=$((IDX + 1))
            SIZE=$(stat -c%s "$file" 2>/dev/null || echo "?")
            FNAME=$(basename "$file")

            EXIT=0
            timeout -v 120 ${{ matrix.binary }}_normal ${{ matrix.run_args }} "$file" > /tmp/crash_out_$IDX.txt 2>&1 || EXIT=$?

            echo ""
            if [ "$EXIT" -eq 124 ]; then
              echo "[$IDX/$CRASH_COUNT] $FNAME ($SIZE bytes) — exit: timeout"
            else
              echo "[$IDX/$CRASH_COUNT] $FNAME ($SIZE bytes) — exit: $EXIT"
            fi
            echo ""
            tail -80 /tmp/crash_out_$IDX.txt
            echo ""
          done

          echo "═══════════════════════════════════════════════════"
          echo "  Total: $CRASH_COUNT crash files"
          echo "═══════════════════════════════════════════════════"

      # ══════════════════════════════════════════════════════════
      # PHASE 6: Artifacts + CI result
      # ══════════════════════════════════════════════════════════
      - name: Store reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: REPORTS___${{ matrix.name }}
          path: /tmp/tmp_folder/data

      - name: Store crash files
        if: always()
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          name: CRASHES___${{ matrix.name }}
          path: /opt/BROKEN_FILES_DIR

      - name: Fail if crashes found
        run: |
          [ "${CRASH_COUNT:-0}" != "0" ] && exit 77 || true
